networks:
  callcenter-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:
  # ── Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: callcenter
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: callcenter_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcenter"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - callcenter-net

  # ── Cache / Broker ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass callcenter_pass --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "callcenter_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - callcenter-net

  # ── Object Storage ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - callcenter-net

  # ── FastAPI Application ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - callcenter-net

  # ── Celery Worker ──────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q critical,high,default,low
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - callcenter-net

  # ── Celery Beat (Scheduler) ────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A workers.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - callcenter-net

  # ── Celery Flower (Monitoring) ─────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A workers.celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - callcenter-net

  # ── LiveKit Server ─────────────────────────────────────
  livekit-server:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - callcenter-net

  # ── LiveKit SIP Bridge ─────────────────────────────────
  livekit-sip:
    image: livekit/sip:latest
    command: --config /etc/sip.yaml
    volumes:
      - ./livekit/sip.yaml:/etc/sip.yaml
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
    depends_on:
      - livekit-server
      - redis
    networks:
      - callcenter-net

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - callcenter-net
