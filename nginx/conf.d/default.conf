# CallCenter Ticket Management System — Nginx Reverse Proxy
# SSL: certbot --nginx -d yourdomain.com

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;

# Upstream definitions
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream livekit_backend {
    server livekit-server:7880;
}

upstream flower_backend {
    server flower:5555;
}

upstream grafana_backend {
    server grafana:3000;
}

# HTTP -> HTTPS redirect (uncomment for production)
# server {
#     listen 80;
#     server_name _;
#     location /.well-known/acme-challenge/ { root /var/www/certbot; }
#     location / { return 301 https://$host$request_uri; }
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for SSL
    server_name _;

    # SSL (uncomment and update paths)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Request size limit (attachments)
    client_max_body_size 50M;

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Auth endpoints (stricter rate limit)
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook endpoints (higher rate limit)
    location /api/v1/email/webhooks/ {
        limit_req zone=webhook_limit burst=200 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/jira/webhooks {
        limit_req zone=webhook_limit burst=200 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE event stream (long-lived connections)
    location /api/v1/events/stream {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Health & metrics (no rate limit)
    location /health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
    }

    location /metrics {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        # Restrict to internal/monitoring only in production
        # allow 10.0.0.0/8;
        # deny all;
    }

    # LiveKit WebRTC signaling
    location /rtc/ {
        proxy_pass http://livekit_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Celery Flower monitoring
    location /flower/ {
        proxy_pass http://flower_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Restrict to internal in production
        # allow 10.0.0.0/8;
        # deny all;
    }

    # Grafana dashboards
    location /grafana/ {
        proxy_pass http://grafana_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
