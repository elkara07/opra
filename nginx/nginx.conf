user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Güvenlik başlıkları ───────────────────────────────
  server_tokens off;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self'; frame-ancestors 'self';" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ─── Rate limiting ─────────────────────────────────────
  # Login/register: 2 istek/saniye (auth)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
  # Genel API: 50 istek/saniye
  limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
  # SMS/voice webhook: 10 istek/saniye
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;

  limit_req_status 429;

  # ─── Performans ────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 20M;
  client_body_timeout 12;
  client_header_timeout 12;
  send_timeout 10;

  # ─── Gzip ─────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  # ─── Log format ────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  access_log /var/log/nginx/access.log main;

  include /etc/nginx/conf.d/*.conf;
}
