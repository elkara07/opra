global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "callcenter-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"

  - job_name: "celery-flower"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["flower:5555"]
        labels:
          service: "celery"

  - job_name: "livekit"
    static_configs:
      - targets: ["livekit-server:7880"]
        labels:
          service: "livekit"
