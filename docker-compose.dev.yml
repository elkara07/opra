# Development: only infrastructure services (DB + Redis + MinIO)
# Backend and frontend run on host for fast reload

services:
  postgres:
    image: postgres:16-alpine
    container_name: callcenter-postgres
    environment:
      POSTGRES_DB: callcenter
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: callcenter_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcenter"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: callcenter-redis
    command: redis-server --requirepass callcenter_pass --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "callcenter_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
